<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D91433"/>
      <stop offset="1" stop-color="#9B0C22"/>
    </linearGradient>
  </defs>
  <!-- background: rounded square (safe-zone friendly for maskable icons) -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- clipboard / audit report -->
  <g transform="translate(256,268)">
    <rect x="-92" y="-140" width="184" height="216" rx="18" fill="#ffffff"/>
    <rect x="-40" y="-158" width="80" height="34" rx="10" fill="#ffffff"/>
    <rect x="-40" y="-158" width="80" height="34" rx="10" fill="none" stroke="#9B0C22" stroke-width="6"/>

    <!-- checklist lines -->
    <g stroke="#C8102E" stroke-width="10" stroke-linecap="round">
      <line x1="-64" y1="-92" x2="34" y2="-92"/>
      <line x1="-64" y1="-52" x2="34" y2="-52"/>
      <line x1="-64" y1="-12" x2="10" y2="-12"/>
    </g>
    <g fill="#C8102E">
      <circle cx="-80" cy="-92" r="7"/>
      <circle cx="-80" cy="-52" r="7"/>
      <circle cx="-80" cy="-12" r="7"/>
    </g>
  </g>

  <!-- magnifying glass overlapping bottom-right of the clipboard -->
  <g transform="translate(300,300)">
    <circle cx="60" cy="30" r="66" fill="#9B0C22" stroke="#ffffff" stroke-width="14"/>
    <circle cx="60" cy="30" r="66" fill="none" stroke="#C8102E" stroke-width="0"/>
    <line x1="106" y1="76" x2="152" y2="122" stroke="#ffffff" stroke-width="26" stroke-linecap="round"/>
    <path d="M 30 30 L 52 52 L 92 8" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
